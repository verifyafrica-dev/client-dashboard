    BillingInformation:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        tenant:
          type: string
          format: uuid
        billing_name:
          type: string
          maxLength: 255
        billing_email:
          type: string
          format: email
          maxLength: 254
        billing_address:
          type: string
        billing_city:
          type: string
          maxLength: 255
        billing_state:
          type: string
          maxLength: 255
        billing_postal_code:
          type: string
          maxLength: 255
        billing_country:
          oneOf:
          - $ref: '#/components/schemas/BillingCountryEnum'
          - $ref: '#/components/schemas/BlankEnum'
        billing_plan:
          $ref: '#/components/schemas/BillingPlanEnum'
        status:
          $ref: '#/components/schemas/BillingInformationStatusEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - billing_plan
      - created_at
      - id
      - tenant
      - updated_at
    BillingInformationStatusEnum:
      enum:
      - active
      - inactive
      type: string
      description: |-
        * `active` - Active
        * `inactive` - Inactive
    BillingPlanEnum:
      enum:
      - payg
      - enterprise
      type: string
      description: |-
        * `payg` - Pay as you go
        * `enterprise` - Enterprise
