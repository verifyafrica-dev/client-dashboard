openapi: 3.0.3
info:
  title: ''
  version: 0.0.0
paths:
  /api/activity-logs/:
    get:
      operationId: activity_logs_list
      description: |-
        Activity log listing with strict access rules.

        Rules:
        - Super admins: full access
        - Non-super admins: default to their own logs
        - Tenant filter:
            - user must belong to tenant
            - otherwise → 404 (no tenant existence leak)
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - json-html
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: tenant
        schema:
          type: string
          format: uuid
        description: Filter activity logs by tenant ID
      - in: query
        name: user
        schema:
          type: string
          format: uuid
        description: Filter activity logs by user ID
      tags:
      - activity-logs
      security:
      - jwtAuth: []
      - basicAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedActivityLogList'
            text/html:
              schema:
                $ref: '#/components/schemas/PaginatedActivityLogList'
          description: ''
